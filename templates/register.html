<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareerSwipe | Register</title>

<style>
*{
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f3f2f1;
    margin:0;
    padding:0;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#2557a7;
    margin-bottom:25px;
}

label{
    font-weight:600;
    margin-top:10px;
    display:block;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    resize:vertical;
}

.row{
    display:flex;
    gap:15px;
}

.row .col{
    flex:1;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#2557a7;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1e4b91;
}

.footer-text{
    text-align:center;
    margin-top:15px;
}

.footer-text a{
    color:#2557a7;
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">
<h2>Create Your CareerSwipe Profile</h2>

<form method="POST" enctype="multipart/form-data">

<label>Full Name</label>
<input type="text" name="full_name" required>

<label>Email Address</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<div class="row">
    <div class="col">
        <label>Phone Number</label>
        <input type="text" name="phone">
    </div>
    <div class="col">
        <label>Gender</label>
        <select name="gender">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
    </div>
</div>

<label>Date of Birth</label>
<input type="date" name="dob">

<div class="row">
    <div class="col">
        <label>Highest Education</label>
        <input type="text" name="education">
    </div>
    <div class="col">
        <label>Qualification / Degree</label>
        <input type="text" name="qualification">
    </div>
</div>

<label>Field of Study</label>
<input type="text" name="field">

<label>Skills</label>
<textarea name="skills" placeholder="Python, Java, HTML, CSS, SQL"></textarea>

<div class="row">
    <div class="col">
        <label>Experience (Years)</label>
        <input type="text" name="experience">
    </div>
    <div class="col">
        <label>Current Job Title</label>
        <input type="text" name="current_job">
    </div>
</div>

<label>Interested Job Role</label>
<input type="text" name="interested_job">

<label>Preferred Job Type</label>
<select name="job_type">
    <option value="">Select</option>
    <option>Full-time</option>
    <option>Part-time</option>
    <option>Internship</option>
    <option>Remote</option>
</select>

<label>Preferred Location</label>
<input type="text" name="location">

<label>Expected Salary</label>
<input type="text" name="salary">

<label>Upload Resume (Optional)</label>
<input type="file" name="resume">

<button type="submit">Create Account</button>

</form>

<div class="footer-text">
Already have an account? <a href="/login">Login</a>
</div>

</div>

</body>
</html>
